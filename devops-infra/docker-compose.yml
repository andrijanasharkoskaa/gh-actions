version: "3.8"

services:
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
    environment:
      - WEBHOOK.ALLOWED_HOST_LIST=*
      - ALLOW_LOCALNETWORKS=true
    restart: always
    networks:
      - devops-network

  nexus:
    image: sonatype/nexus3
    container_name: nexus
    ports:
      - "8081:8081"
      - "8083:8083"
    volumes:
      - nexus-data:/nexus-data
    restart: always
    networks:
      - devops-network

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./blue:/blue
      - ./green:/green
      - ./nginx:/nginx
    depends_on:
      - gitea
      - nexus
    restart: always
    networks:
      - devops-network

  blue-app:
    image: nginx:alpine
    container_name: blue-app
    volumes:
      - ./blue:/usr/share/nginx/html
    expose:
      - "80"
    restart: always
    networks:
      - devops-network

  green-app:
    image: nginx:alpine
    container_name: green-app
    volumes:
      - ./green:/usr/share/nginx/html
    expose:
      - "80"
    restart: always
    networks:
      - devops-network

  reverse-proxy:
    image: nginx:alpine
    container_name: reverse-proxy
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blue-app
      - green-app
    restart: always
    networks:
      - devops-network

volumes:
  gitea-data:
  nexus-data:
  jenkins-data:

networks:
  devops-network:
    driver: bridge
