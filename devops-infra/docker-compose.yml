version: "3.8"

services:
  blue-app:
    image: nginx:alpine
    container_name: blue-app
    volumes:
      - ../blue:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      - bg-net

  green-app:
    image: nginx:alpine
    container_name: green-app
    volumes:
      - ../green:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      - bg-net

  reverse-proxy:
    image: nginx:alpine
    container_name: reverse-proxy
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blue-app
      - green-app
    networks:
      - bg-net

networks:
  bg-net:
    driver: bridge
