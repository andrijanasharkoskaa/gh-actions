user  nginx;
worker_processes  1;

events {
    worker_connections 1024;
}

http {

    upstream app {
        server blue-app:3002;   # Start with Blue environment active
        # To switch to Green, change this to green-app:3002
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

}