events {}

http {
    upstream app {
        # Default route: blue environment
        server blue-app:80;
        # To switch traffic to green, comment the line above and uncomment the line below:
        # server green-app:80;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://app;
        }
    }
}
