version: "3.8"

services:
  mongo:
    image: mongo:6

    container_name: mongo

    volumes:
      - mongo-data:/data/db

    networks:
      - devops-network

    restart: always

  backend-blue:
    image: ghcr.io/andrijanasharkoskaa/gh-actions/backend:latest

    container_name: backend-blue

    environment:
      INSTANCE_NAME: BLUE

      MONGO_URL: mongodb://mongo:27017/testdb

    depends_on:
      - mongo

    networks:
      - devops-network

    restart: always

  backend-green:
    image: ghcr.io/andrijanasharkoskaa/gh-actions/backend:latest

    container_name: backend-green

    environment:
      INSTANCE_NAME: GREEN

      MONGO_URL: mongodb://mongo:27017/testdb

    depends_on:
      - mongo

    networks:
      - devops-network

    restart: always

  frontend-blue:
    image: ghcr.io/andrijanasharkoskaa/gh-actions/frontend:latest

    container_name: frontend-blue

    depends_on:
      - backend-blue

    networks:
      - devops-network

    restart: always

  frontend-green:
    image: ghcr.io/andrijanasharkoskaa/gh-actions/frontend:latest

    container_name: frontend-green

    depends_on:
      - backend-green

    networks:
      - devops-network

    restart: always

  reverse-proxy:
    image: nginx:alpine

    container_name: reverse-proxy

    ports:
      - "8090:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend-blue

      - frontend-green

      - backend-blue

      - backend-green

    networks:
      - devops-network

    restart: always

volumes:
  mongo-data:

networks:
  devops-network:
    name: devops-network
