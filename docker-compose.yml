version: "3.8"

services:
  mongo:
    image: mongo:6

    container_name: mongo

    volumes:
      - mongo-data:/data/db

    networks:
      - devops-network

  backend-blue:
    image: backend:v1

    container_name: backend-blue

    environment:
      INSTANCE_NAME: BLUE

      MONGO_URL: mongodb://mongo:27017/testdb

    networks:
      - devops-network

  backend-green:
    image: backend:v2

    container_name: backend-green

    environment:
      INSTANCE_NAME: GREEN

      MONGO_URL: mongodb://mongo:27017/testdb

    networks:
      - devops-network

  frontend-blue:
    image: frontend:v1

    container_name: frontend-blue

    networks:
      - devops-network

  frontend-green:
    image: frontend:v2

    container_name: frontend-green

    networks:
      - devops-network

  reverse-proxy:
    image: nginx:alpine

    container_name: reverse-proxy

    ports:
      - "8090:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend-blue
      - frontend-green
      - backend-blue
      - backend-green

    networks:
      - devops-network

volumes:
  mongo-data:

networks:
  devops-network:
    name: devops-network
